services:
  backend:
    build:
      context: ./backend
    image: backend:1.0
    container_name: resume-backend
    env_file: .env
    ports:
      - "8001:8001"
    networks:
      - app-net
    volumes:
      - ./backend/data/:/app/data:ro
    restart: unless-stopped
    depends_on:
      - ollama

  frontend:
    build:
      context: ./frontend
    image: frontend:1.0
    container_name: resume-frontend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - backend
    networks:
      - app-net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: resume-ollama
    ports:
      - "11434:11434"
    volumes:
      - ${HOME:-/home/kchiang}/.ollama:/root/.ollama
    networks:
      - app-net
    restart: unless-stopped


networks:
  app-net:
    driver: bridge
